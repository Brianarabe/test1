{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Property</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>

<section class="form-container">

    <form method="POST" enctype="multipart/form-data" class="add-property-form">
        {% csrf_token %}

        <h3>Add New Property</h3>

        {{ form.as_p }}

        <button type="submit" class="btn">Add Property</button>

        <p>
            <a href="{% url 'agent_dashboard' %}">
                ← Back to Dashboard
            </a>
        </p>

    </form>

</section>

</body>
</html>
